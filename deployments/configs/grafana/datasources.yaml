apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://city-prometheus:9090
    access: proxy

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://city-tempo:3200
    access: proxy

  - name: Loki
    type: loki
    uid: loki
    url: http://city-loki:3100
    access: proxy
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "trace_id\":\"(\\w+)"
          name: TraceID
          url: '$${__value.raw}'
